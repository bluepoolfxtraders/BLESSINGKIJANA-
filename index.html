<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLEZ0FX Terminal</title>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<!-- Three.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>

<style>
:root{
--accent:#00c896;
--bg:#0d1117;
--panel:#161b22;
--text:#e6edf3;
--muted:#8b949e;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui,-apple-system;
}

body{
background:var(--bg);
color:var(--text);
overflow-x:hidden;
}

/* WebGL */
#bg{
position:fixed;
top:0;
left:0;
z-index:-1;
opacity:0.2;
}

/* Layout */
.container{
max-width:1200px;
margin:auto;
padding:20px;
}

/* Navbar */
nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(8px);
position:sticky;
top:0;
z-index:10;
}

nav h1{
font-size:18px;
color:var(--accent);
}

nav button{
background:var(--accent);
border:none;
padding:8px 14px;
border-radius:6px;
cursor:pointer;
}

/* Grid */
.grid{
display:grid;
grid-template-columns:2fr 1fr;
gap:20px;
margin-top:20px;
}

/* Panels */
.panel{
background:var(--panel);
border-radius:10px;
padding:15px;
}

/* Chart */
#chart{
height:400px;
}

/* Signals */
.signal{
display:flex;
justify-content:space-between;
padding:10px 0;
border-bottom:1px solid #222;
}

.buy{color:#00ff9c;}
.sell{color:#ff4d4d;}

/* Ticker */
.ticker{
display:flex;
gap:15px;
overflow:hidden;
font-size:14px;
color:var(--muted);
}

/* Auth modal */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#111;
padding:30px;
border-radius:10px;
width:300px;
}

.modal input{
width:100%;
padding:10px;
margin-bottom:10px;
background:#1a1a1a;
border:none;
color:white;
}

.modal button{
width:100%;
padding:10px;
background:var(--accent);
border:none;
}

/* Admin */
#admin{
display:none;
margin-top:20px;
}

</style>
</head>

<body>

<canvas id="bg"></canvas>

<nav>
<h1>BLEZ0FX TERMINAL</h1>
<button onclick="openAuth()">Login</button>
</nav>

<div class="container">

<div class="ticker" id="ticker"></div>

<div class="grid">

<div class="panel">
<div id="chart"></div>
</div>

<div class="panel">
<h3>Signals</h3>
<div id="signals"></div>
</div>

</div>

<div id="admin" class="panel">
<h3>Admin Panel</h3>
<p>Manage signals (UI ready)</p>
</div>

</div>

<!-- AUTH -->
<div class="modal" id="auth">
<div class="modal-box">
<h3>Login</h3>
<input placeholder="Username">
<input type="password" placeholder="Password">
<button onclick="login()">Access</button>
</div>
</div>

<!-- TradingView -->
<script src="https://s3.tradingview.com/tv.js"></script>

<script>
// TradingView Chart
new TradingView.widget({
"container_id": "chart",
"width": "100%",
"height": 400,
"symbol": "EURUSD",
"interval": "15",
"theme": "dark",
"style": "1",
"locale": "en"
});

// Fake Live Prices (replace with API later)
const pairs = ["EUR/USD","GBP/USD","BTC/USD"];
const ticker = document.getElementById("ticker");

function updateTicker(){
ticker.innerHTML = pairs.map(p=>{
let price=(Math.random()*100).toFixed(2);
return `<div>${p}: ${price}</div>`;
}).join("");
}
setInterval(updateTicker,1000);
updateTicker();

// Signals
const signals = document.getElementById("signals");

function generateSignal(){
let types=["BUY","SELL"];
let pair=pairs[Math.floor(Math.random()*pairs.length)];
let type=types[Math.floor(Math.random()*2)];

signals.innerHTML = `
<div class="signal">
<span>${pair}</span>
<span class="${type.toLowerCase()}">${type}</span>
</div>` + signals.innerHTML;
}
setInterval(generateSignal,3000);

// Auth
function openAuth(){
document.getElementById("auth").style.display="flex";
}

function login(){
document.getElementById("auth").style.display="none";
document.getElementById("admin").style.display="block";
}

// WebGL (subtle particles)
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75,window.innerWidth/window.innerHeight,0.1,1000);

const renderer = new THREE.WebGLRenderer({
canvas:document.querySelector('#bg'),
alpha:true
});

renderer.setSize(window.innerWidth,window.innerHeight);

const geometry = new THREE.BufferGeometry();
const vertices = [];

for(let i=0;i<5000;i++){
vertices.push(
(Math.random()-0.5)*1000,
(Math.random()-0.5)*1000,
(Math.random()-0.5)*1000
);
}

geometry.setAttribute('position', new THREE.Float32BufferAttribute(vertices,3));

const material = new THREE.PointsMaterial({
size:1,
color:0x00c896
});

const points = new THREE.Points(geometry,material);
scene.add(points);

camera.position.z = 5;

function animate(){
requestAnimationFrame(animate);
points.rotation.y += 0.0005;
renderer.render(scene,camera);
}
animate();

// Smooth load animation
gsap.from(".panel",{
opacity:0,
y:20,
duration:0.6,
stagger:0.1
});

</script>

</body>
</html>
