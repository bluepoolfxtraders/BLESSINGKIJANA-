<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLUE POOL FX TERMINAL</title>

<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono&family=Space+Grotesk&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>
:root{
--cyan:#00f2ff;
--bg:#020617;
--border:rgba(0,242,255,0.15);
--green:#10b981;
--red:#ef4444;
}

*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:#fff;font-family:'Space Grotesk';overflow-x:hidden}

/* ===== 1000 LINE GUTTER ===== */
#line-gutter{
position:fixed;left:0;top:0;width:60px;height:100%;
background:#000;border-right:1px solid var(--border);
font-family:'JetBrains Mono';font-size:10px;color:#334155;
padding-top:80px;text-align:center;overflow:hidden;z-index:999;
}

/* ===== CANVAS ===== */
#webgl-canvas{
position:fixed;top:0;left:0;width:100%;height:100%;
z-index:-1;
}

/* ===== HEADER ===== */
header{
position:fixed;width:100%;padding:15px 20px;
display:flex;justify-content:space-between;
background:rgba(0,0,0,0.7);
padding-left:80px;border-bottom:1px solid var(--border);
z-index:1000;
align-items:center;
}

/* CLOCK */
#clock{
font-family:'JetBrains Mono';
color:var(--cyan);
font-size:12px;
}

/* HERO */
.hero{
height:100vh;display:flex;flex-direction:column;
justify-content:center;align-items:center;
padding-left:60px;text-align:center;
}

.hero h1{font-size:clamp(3rem,10vw,7rem)}
.hero p{color:var(--cyan);letter-spacing:6px;font-family:'JetBrains Mono'}

.btn{
border:1px solid var(--cyan);
padding:10px 20px;color:var(--cyan);
cursor:pointer;margin:5px;
}
.btn:hover{background:var(--cyan);color:#000}

/* ===== SECTIONS ===== */
section{
padding:100px 80px;
border-top:1px solid var(--border);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
border:1px solid var(--border);
padding:20px;border-radius:10px;
background:rgba(255,255,255,0.02);
position:relative;
}

/* SIGNAL PULSE */
.pulse{
width:10px;height:10px;border-radius:50%;
background:var(--cyan);
position:absolute;top:10px;right:10px;
animation:pulse 1.5s infinite;
}
@keyframes pulse{
0%{transform:scale(1);opacity:1}
100%{transform:scale(3);opacity:0}
}

/* INPUT */
input,select{
width:100%;padding:10px;margin-top:10px;
background:#000;color:#fff;border:1px solid var(--border);
}

/* CHAT */
#chat{
height:200px;overflow:auto;
font-family:'JetBrains Mono';
font-size:12px;
}

/* TICKER */
.ticker{
position:fixed;bottom:0;width:100%;
background:#000;padding:8px;
font-family:'JetBrains Mono';
white-space:nowrap;
overflow:hidden;
}
.ticker-track{
display:inline-block;
animation:scroll 25s linear infinite;
}
@keyframes scroll{
0%{transform:translateX(100%)}
100%{transform:translateX(-100%)}
}
.up{color:var(--green)}
.down{color:var(--red)}
</style>
</head>

<body>

<div id="line-gutter"></div>
<canvas id="webgl-canvas"></canvas>

<header>
<div>BLUE POOL</div>
<div id="clock"></div>
<div id="user"></div>
<div>
<button class="btn" onclick="openLogin()">Login</button>
<button class="btn" onclick="logout()">Logout</button>
</div>
</header>

<div class="hero">
<h1>BLEZO FX</h1>
<p>INSTITUTIONAL FLOW</p>
</div>

<section>
<h2>Live Forex Prices</h2>
<div id="prices"></div>
</section>

<section>
<h2>Signals</h2>
<div id="signals" class="grid"></div>

<h3>Admin Panel</h3>
<input id="pair" placeholder="Pair (e.g EURUSD)">
<select id="type"><option>BUY</option><option>SELL</option></select>
<button class="btn" onclick="addSignal()">Add Signal</button>
</section>

<section>
<h2>Community Chat</h2>
<div id="chat"></div>
<input id="msg" placeholder="Message...">
</section>

<section>
<h2>Chart</h2>
<div id="tv" style="height:400px"></div>
</section>

<!-- LOGIN -->
<div id="loginBox" style="display:none;position:fixed;top:30%;left:30%;background:#000;padding:20px">
<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="register()">Register</button>
</div>

<div class="ticker">
<div class="ticker-track" id="ticker"></div>
</div>

<script>
// ===== 1000 LINE NUMBERS =====
let g="";
for(let i=1;i<=1000;i++){
g+=`<div>${i.toString().padStart(4,'0')}</div>`;
}
document.getElementById("line-gutter").innerHTML=g;

// ===== CLOCK =====
setInterval(()=>{
document.getElementById("clock").innerText=new Date().toUTCString();
},1000);

// ===== AUTH =====
if(!localStorage.getItem("users")){
localStorage.setItem("users",JSON.stringify([
{email:"admin@bluepool.com",password:"1234",role:"admin"}
]));
}

let currentUser=JSON.parse(localStorage.getItem("currentUser")||"null");

function updateUser(){
user.innerText=currentUser?currentUser.email+" ("+currentUser.role+")":"Not logged";
}
updateUser();

function openLogin(){loginBox.style.display="block"}

function login(){
let users=JSON.parse(localStorage.getItem("users"));
let u=users.find(x=>x.email===email.value && x.password===pass.value);
if(u){
currentUser=u;
localStorage.setItem("currentUser",JSON.stringify(u));
updateUser();
alert("Logged in");
}
}

function register(){
let users=JSON.parse(localStorage.getItem("users"));
users.push({email:email.value,password:pass.value,role:"user"});
localStorage.setItem("users",JSON.stringify(users));
alert("Registered");
}

function logout(){
localStorage.removeItem("currentUser");
currentUser=null;
updateUser();
}

// ===== SIGNALS =====
let signals=JSON.parse(localStorage.getItem("signals")||"[]");

function renderSignals(){
let html="";
signals.forEach((s,i)=>{
html+=`
<div class="card">
<div class="pulse"></div>
${s.pair} - <span class="${s.type==='BUY'?'up':'down'}">${s.type}</span>
${currentUser && currentUser.role==="admin" ? `<button onclick="del(${i})">X</button>`:""}
</div>`;
});
signals.innerHTML=html;
}
renderSignals();

function addSignal(){
if(!currentUser || currentUser.role!=="admin"){alert("Admin only");return;}
signals.push({pair:pair.value,type:type.value});
localStorage.setItem("signals",JSON.stringify(signals));
renderSignals();
}

function del(i){
signals.splice(i,1);
localStorage.setItem("signals",JSON.stringify(signals));
renderSignals();
}

// ===== CHAT =====
msg.addEventListener("keypress",e=>{
if(e.key==="Enter"){
chat.innerHTML+=`<div>${msg.value}</div>`;
localStorage.setItem("chat",chat.innerHTML);
msg.value="";
}
});
chat.innerHTML=localStorage.getItem("chat")||"";

// ===== FOREX API =====
async function loadPrices(){
let res=await fetch("https://api.exchangerate.host/latest?base=USD");
let d=await res.json();
prices.innerHTML=`
EUR/USD: ${d.rates.EUR}<br>
GBP/USD: ${d.rates.GBP}<br>
JPY/USD: ${d.rates.JPY}
`;
}
setInterval(loadPrices,5000);
loadPrices();

// ===== TICKER =====
ticker.innerHTML="<span>XAUUSD +1.2%</span><span>EURUSD -0.3%</span><span>GBPUSD +0.5%</span>";

// ===== TRADINGVIEW =====
let script=document.createElement("script");
script.src="https://s3.tradingview.com/tv.js";
script.onload=()=>{
new TradingView.widget({
container_id:"tv",
symbol:"FX:XAUUSD",
theme:"dark",
autosize:true
});
};
document.body.appendChild(script);

// ===== WEBGL INFINITY =====
const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({canvas:webgl-canvas,alpha:true});
renderer.setSize(innerWidth,innerHeight);

const count=2000;
const geo=new THREE.BufferGeometry();
const pos=new Float32Array(count*3);
const off=new Float32Array(count);
for(let i=0;i<count;i++) off[i]=Math.random()*6;
geo.setAttribute("position",new THREE.BufferAttribute(pos,3));

const mat=new THREE.PointsMaterial({size:0.01,color:0x00f2ff});
const mesh=new THREE.Points(geo,mat);
scene.add(mesh);
camera.position.z=3;

let t=0;
function animate(){
requestAnimationFrame(animate);
for(let i=0;i<count;i++){
let i3=i*3;
let tt=t+off[i];
pos[i3]=Math.sin(tt)*1.5;
pos[i3+1]=Math.sin(tt*2)*0.8;
pos[i3+2]=Math.cos(tt)*0.5;
}
geo.attributes.position.needsUpdate=true;
renderer.render(scene,camera);
t+=0.01;
}
animate();

// ===== GSAP =====
gsap.from(".hero h1",{y:50,opacity:0,duration:1});
gsap.from(".card",{opacity:0,y:40,stagger:0.2});
</script>

</body>
    </html>
