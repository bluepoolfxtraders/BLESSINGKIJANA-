<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLEZO FX | Blue Pool Institutional Terminal v69</title>
    <style>
        /* CSS ARCHITECTURE: THE VISUAL ENGINE
           This section handles the "Spatial UI" and the cinematic overlays.
        */
        :root {
            --neon-blue: #00d4ff;
            --matrix-green: #00ff88;
            --warning-red: #ff0055;
            --glass-bg: rgba(0, 15, 30, 0.4);
            --border-glow: rgba(0, 212, 255, 0.3);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #010103;
            font-family: 'Courier New', Courier, monospace;
            cursor: crosshair;
            color: #ffffff;
        }

        /* CRT SCANLINES: Mimics the high-end trading monitors from your video */
        body::after {
            content: " ";
            display: block;
            position: absolute;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 100;
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
            opacity: 0.6;
        }

        #webgl-container {
            position: fixed;
            top: 0; left: 0;
            z-index: 1;
            filter: contrast(1.2) brightness(1.1);
        }

        /* SPATIAL UI: THE TRADING TERMINAL INTERFACE */
        .interface-layer {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            perspective: 1000px;
        }

        .main-terminal {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border-glow);
            padding: 60px;
            border-radius: 4px;
            text-align: center;
            pointer-events: auto;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.9), inset 0 0 20px rgba(0, 212, 255, 0.05);
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            max-width: 90%;
        }

        /* GLITCH ENGINE: THE HIGH-SPEED DATA EFFECT */
        .glitch-brand {
            font-size: clamp(2rem, 8vw, 5rem);
            font-weight: 900;
            color: white;
            letter-spacing: 20px;
            position: relative;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        .glitch-brand::before, .glitch-brand::after {
            content: "BLEZO FX";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
        }

        .glitch-brand::before {
            left: 3px;
            text-shadow: -3px 0 var(--warning-red);
            clip: rect(44px, 450px, 56px, 0);
            animation: glitch-anim 4s infinite linear alternate-reverse;
        }

        .glitch-brand::after {
            left: -3px;
            text-shadow: -3px 0 var(--neon-blue);
            clip: rect(10px, 450px, 30px, 0);
            animation: glitch-anim 2s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim {
            0% { clip: rect(15px, 9999px, 80px, 0); transform: skew(0.5deg); }
            5% { clip: rect(40px, 9999px, 10px, 0); transform: skew(-1deg); }
            10% { clip: rect(85px, 9999px, 100px, 0); transform: skew(0deg); }
            15% { clip: rect(0px, 9999px, 0px, 0); } 
            20% { clip: rect(30px, 9999px, 60px, 0); }
            100% { clip: rect(10px, 9999px, 90px, 0); }
        }

        .sub-text {
            color: var(--neon-blue);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-top: 10px;
            opacity: 0.8;
            font-size: 1rem;
        }

        /* DATA LOGS: SMART MONEY CONCEPTS FEED */
        .log-box {
            margin-top: 40px;
            font-family: 'Courier New', monospace;
            color: var(--matrix-green);
            font-size: 0.85rem;
            text-align: left;
            border-top: 1px solid rgba(0, 212, 255, 0.1);
            padding-top: 20px;
            min-height: 100px;
        }

        .cursor-line { animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        .trade-btn {
            margin-top: 30px;
            padding: 15px 40px;
            background: transparent;
            color: var(--neon-blue);
            border: 1px solid var(--neon-blue);
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .trade-btn:hover {
            background: var(--neon-blue);
            color: black;
            box-shadow: 0 0 30px var(--neon-blue);
        }
    </style>
</head>
<body>

    <canvas id="webgl-container"></canvas>

    <div class="interface-layer">
        <div class="main-terminal" id="tilt-card">
            <div class="glitch-brand">BLEZO FX</div>
            <div class="sub-text">Blue Pool Institutional Trading Logic</div>
            
            <div class="log-box">
                <div>[SYSTEM]: BLUE POOL BOT V69 INITIALIZED...</div>
                <div>[DATA]: SCANNING SMC ORDER BLOCKS...</div>
                <div id="dynamic-log">> WAITING FOR LIQUIDITY SIGNAL...</div>
                <div>[STATUS]: ONLINE <span class="cursor-line">_</span></div>
            </div>

            <button class="trade-btn" onclick="triggerExplosion()">Execute Trade</button>
        </div>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // 1. SCENE SETUP
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.querySelector('#webgl-container'), 
            antialias: true,
            alpha: true 
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        camera.position.z = 60;

        // 2. LIQUIDITY PARTICLE SYSTEM (15,000 Nodes)
        const particleCount = 15000;
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(particleCount * 3);

        for(let i = 0; i < particleCount * 3; i++) {
            positions[i] = (Math.random() - 0.5) * 250;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({
            size: 0.15,
            color: 0x00d4ff,
            transparent: true,
            opacity: 0.5,
            blending: THREE.AdditiveBlending
        });

        const starField = new THREE.Points(geometry, material);
        scene.add(starField);

        // 3. MOUSE TRACKING & INTERACTIVE TILT
        let mouseX = 0, mouseY = 0;
        const card = document.getElementById('tilt-card');

        window.addEventListener('mousemove', (e) => {
            mouseX = (e.clientX - window.innerWidth / 2);
            mouseY = (e.clientY - window.innerHeight / 2);

            // Calculate tilt degrees for the glass card
            const xRotation = (window.innerHeight / 2 - e.clientY) / 15;
            const yRotation = (e.clientX - window.innerWidth / 2) / 15;
            card.style.transform = `rotateX(${xRotation}deg) rotateY(${yRotation}deg)`;
        });

        // 4. ANIMATION PIPELINE
        function animate() {
            requestAnimationFrame(animate);

            // Subtle matrix rotation
            starField.rotation.y += 0.0006;
            starField.rotation.x += 0.0002;

            // Smooth camera follow (LERP)
            camera.position.x += (mouseX * 0.06 - camera.position.x) * 0.03;
            camera.position.y += (-mouseY * 0.06 - camera.position.y) * 0.03;
            camera.lookAt(scene.position);

            renderer.render(scene, camera);
        }

        // 5. SMC TRADING LOGS
        const tradeLogs = [
            "> [ANALYSIS]: FAIR VALUE GAP DETECTED AT 1.0942",
            "> [LIQUIDITY]: SELL-SIDE LIQUIDITY CLEARED",
            "> [INSTITUTIONAL]: HEAVY ACCUMULATION DETECTED",
            "> [ORDER BLOCK]: MITIGATION IN PROGRESS...",
            "> [DATA]: REFRESHING BLUE POOL TRADING NODES"
        ];
        let logIndex = 0;
        setInterval(() => {
            document.getElementById('dynamic-log').innerText = tradeLogs[logIndex];
            logIndex = (logIndex + 1) % tradeLogs.length;
        }, 3000);

        // 6. WINDOW RESIZING
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();

        // 7. INTERACTIVE PARTICLE BURST
        window.triggerExplosion = function() {
            starField.material.color.setHex(0x00ff88); // Turn green on success
            starField.scale.set(1.5, 1.5, 1.5);
            setTimeout(() => {
                starField.material.color.setHex(0x00d4ff);
                starField.scale.set(1, 1, 1);
            }, 500);
        };
    </script>
</body>
</html>
